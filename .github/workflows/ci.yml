name: CI — Build & Test

on:
  pull_request:
    branches:
      - master
    # Dispara apenas em PRs originados da develop
    # (branches com outros nomes não ativam este workflow)
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build-and-test:
    name: Build & Test (Java 25)
    runs-on: ubuntu-latest

    # Testcontainers precisa do Docker — o ubuntu-latest já tem,
    # mas precisamos garantir que o serviço está ativo
    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build e testes de integração
        run: ./gradlew build --no-daemon
        env:
          # Testcontainers no GitHub Actions precisa do socket do Docker
          TESTCONTAINERS_RYUK_DISABLED: true
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7