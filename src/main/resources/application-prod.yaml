spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 600000        # 10 min (menor que timeout do Railway ~15min)
      keepalive-time: 60000       # ping a cada 1 min para manter conexão viva
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway cuida do schema — nunca usar create/update em prod
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # OAuth2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  # E-mail (configurar no profile de prod)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ──────────────────────────────────────────────
#  JWT
# ──────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}             # mínimo 256 bits — gere com: openssl rand -hex 32
  access-token-expiration-ms: 900000        # 15 minutos
  refresh-token-expiration-ms: 604800000    # 7 dias

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
