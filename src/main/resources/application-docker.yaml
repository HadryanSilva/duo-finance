spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/duofinance}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 120000
      max-lifetime: 180000
      keepalive-time: 60000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # OAuth2 Google
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "https://duofinance.dev.br/login/oauth2/code/{registrationId}"

  # E-mail
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:b613679a0814d9ec772f95d778c35fc5ff1697c493715653c6c712144292c5ad}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

# ── Cloudinary ─────────────────────────────────────────────────────────────────
cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# ── Actuator ───────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

# ── Logs ───────────────────────────────────────────────────────────────────────
# Sem DEBUG — diferente do dev, aqui queremos logs mais limpos
logging:
  level:
    root: INFO
    br.com.hadryan.duo.finance: INFO
    org.springframework.security: WARN

# ── Server ─────────────────────────────────────────────────────────────────────
# Garante que o Spring usa o Host/Proto corretos vindos do nginx
# para montar a redirect_uri do OAuth2 (http://localhost/login/oauth2/code/google)
server:
  forward-headers-strategy: framework