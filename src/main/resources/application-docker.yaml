spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/duofinance}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 120000
      max-lifetime: 180000
      keepalive-time: 60000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # OAuth2 Google
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "https://duofinance.dev.br/login/oauth2/code/{registrationId}"

  # E-mail
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

# ── Cloudinary ─────────────────────────────────────────────────────────────────
cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# ── Actuator + Observabilidade ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # health: healthcheck do Cloudflare Tunnel
        # prometheus: scrape pelo Prometheus
        # metrics: consulta ad-hoc de métricas
        include: health, prometheus, metrics
      base-path: /actuator

  endpoint:
    health:
      # ALWAYS: exibe detalhes de todos os health indicators (db, diskSpace, etc.)
      # Ficará visível apenas internamente (Prometheus está na rede Docker)
      show-details: always
      show-components: always
    prometheus:
      enabled: true

  # ── Health indicators ─────────────────────────────────────────────────────
  health:
    mail:
      enabled: false        # evita falso-negativo se SMTP estiver lento
    db:
      enabled: true         # verifica conectividade com PostgreSQL
    diskspace:
      enabled: true
      threshold: 524288000  # alerta se disco livre < 500 MB

  # ── Métricas Micrometer ───────────────────────────────────────────────────
  metrics:
    tags:
      application: duofinance   # tag global em todas as métricas
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true    # histograma de latência HTTP
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 250ms, 500ms, 1s

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    metrics:
      export:
        enabled: true
        step: 60s   # intervalo de agregação

# ── Logs estruturados (JSON) ─────────────────────────────────────────────────
# logback-spring.xml seleciona o appender "json" quando o profile "docker" está ativo
logging:
  level:
    root: INFO
    br.com.hadryan.duo.finance: INFO
    org.springframework.security: WARN
    com.zaxxer.hikari: WARN

# ── Server ─────────────────────────────────────────────────────────────────────
# Garante que o Spring usa o Host/Proto corretos vindos do nginx
# para montar a redirect_uri do OAuth2 (http://localhost/login/oauth2/code/google)
server:
  forward-headers-strategy: framework